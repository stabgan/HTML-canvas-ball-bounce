<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bouncing ball animation using HTML5 Canvas">
  <title>Canvas Ball Bounce</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
    }
    #myCan {
      border: 1px solid #444;
      border-radius: 4px;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="myCan" width="640" height="480"></canvas>
  <script src="script.js"></script>
</body>
</html>
